version: "3.9"

services:
  api:
    build: .
    env_file:
      - .env
    environment:
      BOOKSTORE_MONGODB_URL: mongodb://mongo:27017
      BOOKSTORE_MONGODB_DB_NAME: online_bookstore
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
